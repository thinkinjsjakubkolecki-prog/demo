<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Dealer FX</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Mermaid dla Process Flow Designer demo (ładowany leniwie przez ESM). -->
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    window.mermaid = mermaid;
    mermaid.initialize({ startOnLoad: false, theme: 'dark', flowchart: { htmlLabels: true, curve: 'basis' } });
    window.dispatchEvent(new CustomEvent('mermaid-ready'));
  </script>
</head>
<body>
  <ech-app-shell></ech-app-shell>
</body>
</html>
